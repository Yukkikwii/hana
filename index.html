<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日花语 - 遇见美好</title>
    <style>
        :root {
            --bg-color: #fdf6f0;
            --text-color: #5a4b41;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', "Microsoft YaHei", sans-serif;
            color: var(--text-color);
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 90%;
            width: 500px;
        }

        h1 { margin-bottom: 1.5rem; font-weight: 300; }

        .image-box {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            background: #eee;
            position: relative;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        .btn {
            margin-top: 1.5rem;
            padding: 10px 25px;
            border: none;
            background-color: #a7c080;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover { background-color: #8da36d; transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="date-title">今日份的花</h1>
        <div class="image-box">
            <img id="flower-img" src="" alt="正在加载花朵...">
        </div>
        <button class="btn" onclick="refreshFlower()">换一朵看看</button>
    </div>

    <script>
        const flowerKeywords = ['flower', 'blossom', 'rose', 'tulip', 'sunflower', 'lily', 'orchid', 'daisy', 'peony'];
        
        function getDailySeed() {
            // 获取当前日期字符串 (例如: 2024-05-20)
            return new Date().toISOString().slice(0, 10);
        }

        function refreshFlower(isManual = true) {
            const imgElement = document.getElementById('flower-img');
            // 如果是自动加载，用日期做随机种子；如果是手动点击，用随机数
            const seed = isManual ? Math.random() : getDailySeed();
            const keyword = flowerKeywords[Math.floor(Math.random() * flowerKeywords.length)];
            
            // 拼接 Unsplash 源地址
            const newSrc = `https://images.unsplash.com/photo-1?auto=format&fit=crop&w=800&q=80&utm_source=flower_app&sig=${seed}&query=${keyword}`;
            
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = newSrc;
                imgElement.onload = () => imgElement.style.opacity = 1;
            }, 300);
        }

        // 页面初始化时加载
        window.onload = () => {
            const options = { month: 'long', day: 'numeric' };
            document.getElementById('date-title').innerText = new Date().toLocaleDateString('zh-CN', options) + " · 遇见";
            refreshFlower(false); 
        };
    </script>
</body>
</html>
